name: F&F Brand Image Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      keyword:
        description: '검색 키워드'
        required: false
        default: '박왕열'

permissions:
  contents: write
  pages: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    concurrency:
      group: brand-monitor
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 이전 분석 이력 복원
      - name: Restore monitoring history
        uses: actions/cache@v4
        with:
          path: |
            monitoring_history.json
            detection_results.json
          key: brand-monitor-history-${{ github.run_number }}
          restore-keys: |
            brand-monitor-history-

      - name: Run Brand Monitor
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python monitor.py

      # 대시보드를 GitHub Pages로 자동 배포
      - name: Deploy Dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ detection_results.json monitoring_history.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "📊 대시보드 업데이트 $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
          git push || true

      - name: Generate Summary
        if: always()
        run: |
          echo "## 🛡 F&F Brand Monitor Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**실행 시각:** $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f detection_results.json ]; then
            TOTAL=$(python3 -c "import json; d=json.load(open('detection_results.json')); print(len(d))")
            DETECTED=$(python3 -c "import json; d=json.load(open('detection_results.json')); print(sum(1 for x in d if x.get('logo_detected')))")
            echo "| 항목 | 수치 |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|" >> $GITHUB_STEP_SUMMARY
            echo "| 총 분석 이미지 | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| 로고 감지 | $DETECTED |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📊 [대시보드 보기](https://yeomjiyeon.github.io/fnf-brand-monitor/)" >> $GITHUB_STEP_SUMMARY
          fi
